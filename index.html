<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUTIQ STUDIO | Özel Yazılım Çözümleri</title>
    <style>
      html, body { margin: 0; padding: 0; background: #111113; }
      #splash {
        position: fixed;
        inset: 0;
        background: #111113;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #5865F2;
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }
    </style>
  </head>
  <body>
    <div id="splash"><div id="splash-dot"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
